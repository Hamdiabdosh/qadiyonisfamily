services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5437:5432"
    environment:
      POSTGRES_DB: qadiyonis
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d qadiyonis"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_APP_URL: ${VITE_APP_URL:-https://qadiyonis.raafat.site}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3000"
    environment:
      SERVICE_FQDN_APP_3000: ${SERVICE_FQDN_APP_3000:-https://qadiyonis.raafat.site:3000}
      SERVICE_URL_APP_3000: ${SERVICE_URL_APP_3000:-https://qadiyonis.raafat.site:3000}
      NODE_ENV: production
      PORT: "3000"
      HOST: 0.0.0.0
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: app
      POSTGRES_DB: qadiyonis
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      VITE_APP_URL: ${VITE_APP_URL:-https://qadiyonis.raafat.site}
      LLM_API_BASE_URL: ${LLM_API_BASE_URL:-https://wadehapi.gitify.site/v1}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-auto}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@qadiyonis.raafat.site}
      UPLOADS_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 180s

volumes:
  pgdata:
  uploads:
